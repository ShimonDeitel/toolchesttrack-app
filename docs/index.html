<!doctype html><html><head><meta charset="utf-8">
<title>Tool Chest</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#101418; color:#EAEFF3; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
.wrap { max-width:560px; padding:40px 20px; }
h1 { color:#6C8EAD; font-size:2.4em; margin-bottom:0.2em; }
p { color:#9FB4C6; line-height:1.5; }
.badge { display:inline-block; margin-top:2em; padding:10px 22px; border:1px solid #6C8EAD; border-radius:30px; color:#6C8EAD; text-decoration:none; }
a { color:#6C8EAD; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #6C8EAD55 0%, #6C8EAD00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div><div class="wrap">
<h1>Tool Chest</h1>
<p>Track a hand-tool or vintage tool collection.</p>
<p>Core feature is free forever. Upgrade to Pro for: Unlimited tools and value-history notes.</p>
<a class="badge" href="privacy.html">Privacy</a> <a class="badge" href="terms.html">Terms</a>
<p style="margin-top:3em;font-size:0.85em;">Contact: s0533495227@gmail.com</p>
</div></body></html>
