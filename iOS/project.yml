name: Tool Chest
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Tool Chest:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tool Chest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolchest
        INFOPLIST_FILE: Tool Chest/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        SUPPORTS_MACCATALYST: NO
    info:
      path: Tool Chest/Info.plist
      properties:
        CFBundleDisplayName: Tool Chest
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
  Tool ChestTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tool ChestTests
    dependencies:
      - target: Tool Chest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolchest.tests
  Tool ChestUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tool ChestUITests
    dependencies:
      - target: Tool Chest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.toolchest.uitests
schemes:
  Tool Chest:
    build:
      targets:
        Tool Chest: all
    test:
      targets:
        - Tool ChestTests
        - Tool ChestUITests
    run:
      config: Debug
    archive:
      config: Release
